name: Sync dev from upstream

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/runhey/OnmyojiAutoScript.git

      - name: Fetch upstream dev
        run: |
          git fetch upstream dev --prune
          git fetch origin dev --prune

      - name: Merge upstream dev into local dev
        run: |
          git merge --no-edit upstream/dev

      - name: Push updated dev
        run: |
          git push origin dev:dev